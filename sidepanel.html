<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickify</title>
    <script src="purify.min.js"></script>
    <link rel="stylesheet" href="sidepanel.css"> </head>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="h1-with-svg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 4H16C17.1046 4 18 4.89543 18 6V18L13 16L8 18V6C8 4.89543 8.89543 4 10 4Z" stroke="#495057" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18 6L19.2929 4.70711C19.6834 4.31658 20.3166 4.31658 20.7071 4.70711C21.0976 5.09763 21.0976 5.7308 20.7071 6.12132L19.5 7.32843" stroke="#495057" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Stickify
            </h1>
            <button class="add-btn" id="addNote">+</button>
        </div>

        <div class="search-sort-row">
            <div class="search-container">
                <span class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="#6c757d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 21L16.65 16.65" stroke="#6c757d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search notes...">
            </div>
            <select class="sort-select" id="sortSelect" aria-label="Sort notes by">
                <option value="dateCreated">Date Created</option>
                <option value="dateModified">Date Modified</option>
            </select>
        </div>

        <div class="toolbar">
            <button class="toolbar-btn" id="addHeading1">H1</button>
            <button class="toolbar-btn" id="addHeading2">H2</button>
            <button class="toolbar-btn underline-btn" id="addUnderline"><u>U</u></button>
            <button class="toolbar-btn" id="addBoldBtn"><b>B</b></button>
            <button class="toolbar-btn" id="addItalicBtn"><i>I</i></button>
            <button class="toolbar-btn" id="addLink">🔗 Link</button>
        </div>
        <template id="note-template">
            <div class="note">
                <div class="note-pin">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 12L19 9L15 5L12 8" stroke="#dc3545" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 8L5 15L9 19L16 12" stroke="#dc3545" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M14.5 9.5L11 13" stroke="#dc3545" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="note-content" contenteditable="true" data-placeholder="Write your note here..."></div>
                <div class="note-toolbar">
                    <div class="color-picker">
                        <button class="color-option yellow" data-color="yellow" aria-label="Set note color to yellow"></button>
                        <button class="color-option pink" data-color="pink" aria-label="Set note color to pink"></button>
                        <button class="color-option blue" data-color="blue" aria-label="Set note color to blue"></button>
                        <button class="color-option green" data-color="green" aria-label="Set note color to green"></button>       
                    </div>
                    <input type="text" class="tags-input" placeholder="Add tags (comma separated)...">
                    <button class="delete-btn" aria-label="Delete note">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 6H5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6H19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </template>

        <div class="notes-container" id="notesContainer">
            <!-- Notes will be added here dynamically -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V9L13 2Z" stroke="#6c757d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
                        <path d="M13 2V9H20" stroke="#6c757d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
                    </svg>
                </div>
                <p>No notes yet.<br>Click + to create your first note!</p>
            </div>
        </div>
    </div>
    <script src="sidepanel.js"></script>
    <div id="linkModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Add Link</h3>
            <div class="form-group">
                <label for="linkUrl">URL:</label>
                <input type="text" id="linkUrl" placeholder="https://example.com">
                <p id="modalError" class="modal-error"></p>
            </div>
            <div class="form-group">
                <label for="linkText">Text to display:</label>
                <input type="text" id="linkText" placeholder="My awesome link">
            </div>
            <div class="modal-actions">
                <button id="cancelLinkBtn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="saveLinkBtn" class="modal-btn modal-btn-save">Save</button>
            </div>
        </div>
    </div>
    </body>
</html>
